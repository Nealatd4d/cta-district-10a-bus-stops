  .search-card {

  .search-card input {

<script>
(function() {
  // ========== THEME ==========
  const root = document.documentElement;
  let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  root.setAttribute('data-theme', theme);
  const themeBtn = document.getElementById('btn-theme');

  function setThemeIcon() {
    themeBtn.innerHTML = theme === 'dark'
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }

  themeBtn.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', theme);
    setThemeIcon();
    updateTileLayer();
    if (boundaryLayer) updateBoundaryStyle();
  });

  // ========== MAP ==========
  const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([41.79, -87.595], 13);
  L.control.attribution({ position: 'bottomright', prefix: false }).addAttribution('&copy; <a href="https://openstreetmap.org">OSM</a> &copy; <a href="https://carto.com">CARTO</a>').addTo(map);

  let tileLayer;
  function updateTileLayer() {
    if (tileLayer) map.removeLayer(tileLayer);
    const isDark = theme === 'dark';
    tileLayer = L.tileLayer(
      isDark ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
             : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
      { maxZoom: 19 }
    ).addTo(map);
  }
  updateTileLayer();

  // ========== DATA ==========
  let allStops = [];
  let markers = {};
  let clusterGroup;
  let activeStopIdx = null;
  let boundaryLayer;
  let userLat = null, userLng = null;
  let userMarker = null, userAccuracy = null;
  let watchId = null;

  const routeColors = {};
  const palette = ['#1e40af','#dc2626','#059669','#d97706','#7c3aed','#db2777','#0891b2','#65a30d','#ea580c','#6366f1','#be185d','#0d9488','#b91c1c','#4338ca','#ca8a04','#c026d3','#0284c7','#16a34a','#9333ea','#e11d48','#0e7490','#a16207','#7e22ce','#15803d','#b45309','#4f46e5','#be123c','#0f766e','#a21caf'];

  function getRouteColor(r) {
    if (!routeColors[r]) routeColors[r] = palette[Object.keys(routeColors).length % palette.length];
    return routeColors[r];
  }

  function createMarkerIcon(hl) {
    return L.divIcon({ className: '', html: `<div class="bus-marker${hl ? ' highlighted' : ''}"></div>`, iconSize: hl ? [16,16] : [10,10], iconAnchor: hl ? [8,8] : [5,5] });
  }

  // Distance in miles
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 3958.8;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function fmtDist(mi) {
    if (mi < 0.15) return Math.round(mi * 5280) + ' ft';
    return mi.toFixed(1) + ' mi';
  }

  function popupContent(stop) {
    const routes = stop.routes.split(',').map(r => r.trim()).filter(Boolean);
    const chips = routes.map(r => `<span class="route-chip" style="background:${getRouteColor(r)}">${r}</span>`).join('');
    const dirMap = { NB:'Northbound', SB:'Southbound', EB:'Eastbound', WB:'Westbound' };
    let distHtml = '';
    if (userLat !== null) {
      const d = haversine(userLat, userLng, stop.lat, stop.lng);
      distHtml = `<div class="popup-dist">📍 ${fmtDist(d)} from you</div>`;
    }
    return `<div class="popup-inner"><strong>${stop.name}</strong><div class="popup-meta">${dirMap[stop.dir]||stop.dir} · ${stop.street} at ${stop.cross}</div>${distHtml}<div class="popup-routes">${chips}</div></div>`;
  }

  function updateBoundaryStyle() {
    const isDark = theme === 'dark';
    boundaryLayer.setStyle({ color: isDark ? '#60a5fa' : '#1e40af', fillColor: isDark ? '#60a5fa' : '#1e40af', fillOpacity: isDark ? 0.08 : 0.06 });
  }

  // ========== LOAD DATA ==========
  Promise.all([
    fetch('stops.json').then(r => r.json()),
    fetch('boundary.json').then(r => r.json()),
  ]).then(([stops, boundary]) => {
    allStops = stops;

    boundaryLayer = L.geoJSON(boundary, {
      style: { weight: 2.5, opacity: 0.7, fillOpacity: 0.06, dashArray: '6 4' }
    }).addTo(map);
    updateBoundaryStyle();

    // Route chips
    const routeSet = new Set();
    stops.forEach(s => s.routes.split(',').forEach(r => { r = r.trim(); if (r) routeSet.add(r); }));
    const sorted = [...routeSet].sort((a, b) => { const na=parseInt(a),nb=parseInt(b); if(!isNaN(na)&&!isNaN(nb)) return na-nb; if(!isNaN(na)) return -1; if(!isNaN(nb)) return 1; return a.localeCompare(b); });

    const chipBar = document.getElementById('chip-bar');
    const routeFilter = document.getElementById('route-filter');
    sorted.forEach(r => {
      // Chip
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = r;
      chip.dataset.route = r;
      chip.addEventListener('click', () => {
        const isActive = chip.classList.contains('active');
        document.querySelectorAll('.chip.active').forEach(c => c.classList.remove('active'));
        if (!isActive) { chip.classList.add('active'); routeFilter.value = r; }
        else { routeFilter.value = ''; }
        renderList();
      });
      chipBar.appendChild(chip);
      // Select option
      const opt = document.createElement('option');
      opt.value = r; opt.textContent = `Route ${r}`;
      routeFilter.appendChild(opt);
    });

    // Markers
    clusterGroup = L.markerClusterGroup({ maxClusterRadius: 40, spiderfyOnMaxZoom: true, showCoverageOnHover: false, disableClusteringAtZoom: 16 });
    stops.forEach((stop, idx) => {
      const marker = L.marker([stop.lat, stop.lng], { icon: createMarkerIcon(false) });
      marker.bindPopup(() => popupContent(stop), { maxWidth: 280 });
      marker.on('click', () => selectStop(idx, false));
      markers[idx] = marker;
      clusterGroup.addLayer(marker);
    });
    map.addLayer(clusterGroup);
    renderList();

    // Auto-request location on load
    if (navigator.geolocation) {
      setTimeout(() => { document.getElementById('btn-locate').click(); }, 800);
    }
  });

  // ========== FILTERS ==========
  const searchInput = document.getElementById('search');
  const searchClear = document.getElementById('search-clear');
  const routeFilter = document.getElementById('route-filter');
  const dirFilter = document.getElementById('dir-filter');

  function getFilteredIndices() {
    const q = searchInput.value.toLowerCase().trim();
    const route = routeFilter.value;
    const dir = dirFilter.value;
    return allStops.reduce((acc, stop, idx) => {
      if (q && !stop.name.toLowerCase().includes(q) && !stop.street.toLowerCase().includes(q) && !stop.cross.toLowerCase().includes(q)) return acc;
      if (route && !stop.routes.split(',').map(r=>r.trim()).includes(route)) return acc;
      if (dir && stop.dir !== dir) return acc;
      acc.push(idx);
      return acc;
    }, []);
  }

  function renderList() {
    const indices = getFilteredIndices();
    const badge = document.getElementById('sheet-badge');
    badge.textContent = `${indices.length} stop${indices.length !== 1 ? 's' : ''}`;

    // Sort by distance if location is known
    if (userLat !== null) {
      indices.sort((a, b) => {
        const da = haversine(userLat, userLng, allStops[a].lat, allStops[a].lng);
        const db = haversine(userLat, userLng, allStops[b].lat, allStops[b].lng);
        return da - db;
      });
    }

    clusterGroup.clearLayers();
    indices.forEach(idx => clusterGroup.addLayer(markers[idx]));

    const listEl = document.getElementById('stop-list');
    const frag = document.createDocumentFragment();
    indices.forEach(idx => {
      const stop = allStops[idx];
      const div = document.createElement('div');
      div.className = 'stop-item' + (idx === activeStopIdx ? ' active' : '');
      div.dataset.idx = idx;

      const routes = stop.routes.split(',').map(r=>r.trim()).filter(Boolean);
      const chips = routes.map(r => `<span class="route-chip" style="background:${getRouteColor(r)}">${r}</span>`).join(' ');

      let distHtml = '';
      if (userLat !== null) {
        const d = haversine(userLat, userLng, stop.lat, stop.lng);
        distHtml = `<span class="stop-dist">${fmtDist(d)}</span>`;
      }

      div.innerHTML = `
        <div class="stop-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></div>
        <div class="stop-content">
          <div class="stop-name">${stop.name}</div>
          <div class="stop-meta"><span>${stop.dir}</span> ${chips}</div>
        </div>
        ${distHtml}
      `;
      div.addEventListener('click', () => { selectStop(idx, true); setSheetState('collapsed'); });
      frag.appendChild(div);
    });
    listEl.innerHTML = '';
    listEl.appendChild(frag);
  }

  function selectStop(idx, flyTo) {
    if (activeStopIdx !== null && markers[activeStopIdx]) markers[activeStopIdx].setIcon(createMarkerIcon(false));
    activeStopIdx = idx;
    markers[idx].setIcon(createMarkerIcon(true));
    if (flyTo) map.flyTo([allStops[idx].lat, allStops[idx].lng], 17, { duration: 0.4 });
    markers[idx].openPopup();
    document.querySelectorAll('.stop-item.active').forEach(el => el.classList.remove('active'));
    const el = document.querySelector(`.stop-item[data-idx="${idx}"]`);
    if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
  }

  let debounce;
  function onFilter() { clearTimeout(debounce); debounce = setTimeout(renderList, 120); }
  searchInput.addEventListener('input', () => {
    searchClear.classList.toggle('visible', searchInput.value.length > 0);
    onFilter();
  });
  searchClear.addEventListener('click', () => { searchInput.value = ''; searchClear.classList.remove('visible'); onFilter(); });
  routeFilter.addEventListener('change', () => {
    document.querySelectorAll('.chip.active').forEach(c => c.classList.remove('active'));
    if (routeFilter.value) {
      const chip = document.querySelector(`.chip[data-route="${routeFilter.value}"]`);
      if (chip) chip.classList.add('active');
    }
    onFilter();
  });
  dirFilter.addEventListener('change', onFilter);

  // ========== GEOLOCATION ==========
  const locBtn = document.getElementById('btn-locate');
  let locating = false;

  locBtn.addEventListener('click', () => {
    if (!navigator.geolocation) { alert('Geolocation is not supported by your browser.'); return; }

    if (locating) {
      // Toggle off
      stopLocating();
      return;
    }

    locating = true;
    locBtn.classList.add('active', 'locating');

    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        locBtn.classList.remove('locating');
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        const acc = pos.coords.accuracy;

        // User marker
        if (!userMarker) {
          userMarker = L.marker([userLat, userLng], {
            icon: L.divIcon({ className: '', html: '<div class="user-marker"></div>', iconSize: [18,18], iconAnchor: [9,9] }),
            zIndexOffset: 2000,
          }).addTo(map);
          userAccuracy = L.circle([userLat, userLng], { radius: acc, className: 'user-accuracy', interactive: false }).addTo(map);
          map.flyTo([userLat, userLng], 15, { duration: 0.5 });
        } else {
          userMarker.setLatLng([userLat, userLng]);
          userAccuracy.setLatLng([userLat, userLng]);
          userAccuracy.setRadius(acc);
        }

        renderList(); // Re-sort by distance
      },
      (err) => {
        locBtn.classList.remove('locating');
        if (err.code === 1) alert('Location permission denied. Please enable location access in your browser settings.');
        else alert('Unable to get your location. Please try again.');
        stopLocating();
      },
      { enableHighAccuracy: true, maximumAge: 10000, timeout: 15000 }
    );
  });

  function stopLocating() {
    locating = false;
    locBtn.classList.remove('active', 'locating');
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
    if (userAccuracy) { map.removeLayer(userAccuracy); userAccuracy = null; }
    userLat = null; userLng = null;
    renderList();
  }

  // ========== BOTTOM SHEET GESTURES ==========
  const sheet = document.getElementById('bottom-sheet');
  const overlay = document.getElementById('sheet-overlay');
  const handle = document.getElementById('sheet-handle');
  let sheetState = 'peek'; // collapsed, peek, full

  function setSheetState(state) {
    sheetState = state;
    sheet.className = 'bottom-sheet sheet-' + state;
    overlay.classList.toggle('visible', state === 'full');
  }

  overlay.addEventListener('click', () => setSheetState('peek'));

  // Touch drag
  let startY = 0, startTranslate = 0, dragging = false;
  const sheetEl = sheet;

  handle.addEventListener('touchstart', (e) => {
    dragging = true;
    startY = e.touches[0].clientY;
    sheetEl.style.transition = 'none';
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dy) > 10) {
      if (dy > 50 && sheetState === 'full') { setSheetState('peek'); dragging = false; sheetEl.style.transition = ''; }
      else if (dy > 50 && sheetState === 'peek') { setSheetState('collapsed'); dragging = false; sheetEl.style.transition = ''; }
      else if (dy < -50 && sheetState === 'collapsed') { setSheetState('peek'); dragging = false; sheetEl.style.transition = ''; }
      else if (dy < -50 && sheetState === 'peek') { setSheetState('full'); dragging = false; sheetEl.style.transition = ''; }
    }
  }, { passive: true });

  document.addEventListener('touchend', () => { dragging = false; sheetEl.style.transition = ''; });

  // Click handle to cycle
  handle.addEventListener('click', () => {
    if (sheetState === 'collapsed') setSheetState('peek');
    else if (sheetState === 'peek') setSheetState('full');
    else setSheetState('peek');
  });
})();
</script>
</body>
</html>
